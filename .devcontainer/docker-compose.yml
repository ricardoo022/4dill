services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/lusitai-aipentest:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/lusitaidb
      - DOCKER_INSIDE=true
      - GRAPHITI_ENABLED=${GRAPHITI_ENABLED:-true}
      - GRAPHITI_URL=${GRAPHITI_URL:-http://graphiti:8000}
      - GRAPHITI_TIMEOUT=${GRAPHITI_TIMEOUT:-30}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lusitaidb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lusitaidb"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26.2
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-changeme} 'RETURN 1;' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  graphiti:
    image: zepai/graphiti:latest
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_PORT: "7687"
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_DB: ${NEO4J_DATABASE:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      GRAPHITI_PORT: "8000"
      MODEL_NAME: ${GRAPHITI_MODEL_NAME:-gpt-4o-mini}
      EMBEDDING_MODEL_NAME: ${GRAPHITI_EMBEDDING_MODEL_NAME:-text-embedding-3-small}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required for graphiti}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthcheck').status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-data:
  neo4j-data:

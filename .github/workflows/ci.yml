name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/pull_request_template.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/pull_request_template.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('**/pyproject.toml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy type check
        run: mypy src/pentest/ --ignore-missing-imports

      - name: Security audit
        run: pip-audit

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('**/pyproject.toml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Run unit tests
        run: >-
          pytest tests/unit/ -v --tb=short --timeout=120
          --cov=src/pentest --cov-report=term-missing --cov-report=xml:coverage.xml
          --junitxml=test-results/unit.xml

      - name: Run eval unit tests (mocked, no credentials needed)
        run: >-
          pytest tests/evals/ -v --tb=short --timeout=120
          -m "not e2e" --junitxml=test-results/evals-unit.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-unit
          path: test-results/unit.xml

      - name: Upload eval unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-evals-unit
          path: test-results/evals-unit.xml

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('**/pyproject.toml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Apply migrations and verify schema
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/testdb
        run: |
          alembic upgrade head
          alembic check

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/testdb
        run: >-
          pytest tests/integration/ -v --tb=short --timeout=120
          -m integration --junitxml=test-results/integration.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration
          path: test-results/integration.xml

  agent:
    name: Agent Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('**/pyproject.toml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Run agent tests
        run: >-
          pytest tests/agent/ -v --tb=short --timeout=120
          -m agent --junitxml=test-results/agent.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-agent
          path: test-results/agent.xml

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [unit, integration, agent]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/changeme
          NEO4J_server_memory_heap_initial__size: 512m
          NEO4J_server_memory_heap_max__size: 512m
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd="wget -qO- http://localhost:7474 >/dev/null || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=40
          --health-start-period=30s
      graphiti:
        image: zepai/graphiti:latest
        env:
          NEO4J_URI: bolt://neo4j:7687
          NEO4J_PORT: "7687"
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: changeme
          GRAPHITI_PORT: "8000"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        ports:
          - 8000:8000
        options: >-
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('**/pyproject.toml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Wait for Neo4j Bolt
        run: |
          python - <<'PY'
          import socket
          import time

          host = "127.0.0.1"
          port = 7687

          for attempt in range(120):
              with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:
                  sock.settimeout(1)
                  if sock.connect_ex((host, port)) == 0:
                      print("Neo4j Bolt is ready")
                      break
              time.sleep(2)
          else:
              raise SystemExit("Neo4j Bolt did not become ready in time")
          PY

      - name: Wait for Graphiti health
        run: |
          python - <<'PY'
          import time
          import urllib.error
          import urllib.request

          urls = ["http://127.0.0.1:8000/healthcheck", "http://127.0.0.1:8000/health"]
          for attempt in range(180):
              for url in urls:
                  try:
                      with urllib.request.urlopen(url, timeout=2) as response:
                          if response.status == 200:
                              print(f"Graphiti health endpoint is ready: {url}")
                              raise SystemExit(0)
                  except urllib.error.HTTPError as exc:
                      if exc.code != 404:
                          raise
                  except (urllib.error.URLError, TimeoutError):
                      pass
              time.sleep(2)
          raise SystemExit("Graphiti health endpoint did not become ready in time")
          PY

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/testdb
          GRAPHITI_E2E_URL: http://127.0.0.1:8000
          GRAPHITI_ENABLED: true
          GRAPHITI_REAL_E2E: false
          GRAPHITI_FORCE_VALIDATE: false
          GRAPHITI_LOCAL_FALLBACK_ENABLED: false
          NEO4J_E2E_URI: bolt://127.0.0.1:7687
          NEO4J_E2E_USER: neo4j
          NEO4J_E2E_PASSWORD: changeme
          NEO4J_URI: bolt://127.0.0.1:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: changeme
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: >-
          pytest tests/e2e/ -v --tb=short --timeout=300
          -m e2e --junitxml=test-results/e2e.xml

      - name: Run strict Graphiti validation
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/testdb
          GRAPHITI_E2E_URL: http://127.0.0.1:8000
          GRAPHITI_ENABLED: true
          GRAPHITI_REAL_E2E: true
          GRAPHITI_FORCE_VALIDATE: true
          GRAPHITI_LOCAL_FALLBACK_ENABLED: false
          NEO4J_E2E_URI: bolt://127.0.0.1:7687
          NEO4J_E2E_USER: neo4j
          NEO4J_E2E_PASSWORD: changeme
          NEO4J_URI: bolt://127.0.0.1:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: changeme
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/e2e/test_graphiti_knowledge_graph.py tests/e2e/test_graphiti_raw_text_to_graph.py -v -m e2e --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-e2e
          path: test-results/e2e.xml

  portswigger-spinup:
    name: PortSwigger Spinup E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('**/pyproject.toml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run PortSwigger spinup E2E tests
        env:
          PORTSWIGGER_EMAIL: ${{ secrets.PORTSWIGGER_EMAIL }}
          PORTSWIGGER_PASSWORD: ${{ secrets.PORTSWIGGER_PASSWORD }}
        run: >-
          pytest tests/evals/test_spinup_e2e.py -v --tb=short --timeout=300
          -m e2e --junitxml=test-results/portswigger-spinup.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-portswigger-spinup
          path: test-results/portswigger-spinup.xml

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [lint, unit, integration, agent]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed"
